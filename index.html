<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .card{
            width:420px;
            padding:35px;
            border-radius:20px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            -webkit-backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.25);
            box-shadow:0 20px 40px rgba(0,0,0,0.25);
            color:#fff;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-8px);
            box-shadow:0 30px 60px rgba(0,0,0,0.35);
        }

        .profile{
            text-align:center;
            margin-bottom:25px;
        }

        .avatar{
            width:90px;
            height:90px;
            margin:auto;
            border-radius:50%;
            background:rgba(255,255,255,0.2);
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:36px;
            font-weight:bold;
            border:3px solid rgba(255,255,255,0.5);
        }

        h1{
            margin-top:15px;
            font-size:28px;
        }

        .subtitle{
            opacity:.8;
            font-size:15px;
        }

        .info{
            margin-top:20px;
        }

        .row{
            display:flex;
            justify-content:space-between;
            padding:14px 0;
            border-bottom:1px solid rgba(255,255,255,0.15);
        }

        .label{
            color:#dfe6ff;
            font-weight:500;
        }

        .value{
            font-weight:600;
            text-align:right;
        }

        .hobbies{
            margin-top:25px;
        }

        .tags{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            margin-top:10px;
        }

        .tag{
            background:rgba(255,255,255,0.18);
            padding:8px 16px;
            border-radius:50px;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="profile">
        <div class="avatar">M</div>
        <h1>K.M. Mahir Labib</h1>
        <p class="subtitle">Student Profile</p>
    </div>

    <div class="info">

        <div class="row">
            <span class="label">Department</span>
            <span class="value">CSE</span>
        </div>

        <div class="row">
            <span class="label">Student ID</span>
            <span class="value">54825</span>
        </div>

        <div class="row">
            <span class="label">Semester</span>
            <span class="value">5th</span>
        </div>

        <div class="row">
            <span class="label">Age</span>
            <span class="value">22</span>
        </div>

    </div>

    <div class="hobbies">
        <h3>Hobbies</h3>

        <div class="tags">
            <div class="tag">📸 Photography</div>
            <div class="tag">✈️ Travelling</div>
        </div>

    </div>

</div>

</body>
</html>
